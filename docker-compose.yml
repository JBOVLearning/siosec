services:

  # ── PHP-FPM (aplicación Laravel) ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      MAIL_HOST: mailpit
    networks:
      - siosec
    volumes:
      - siosec-storage:/var/www/html/storage/app
      - siosec-logs:/var/www/html/storage/logs
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx (servidor web) ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    volumes_from:
      - app:ro
    networks:
      - siosec
    depends_on:
      - app

  # ── Worker de colas Laravel ────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
    networks:
      - siosec
    volumes:
      - siosec-storage:/var/www/html/storage/app
      - siosec-logs:/var/www/html/storage/logs
    depends_on:
      pgsql:
        condition: service_healthy

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  pgsql:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - siosec-pgsql:/var/lib/postgresql
    networks:
      - siosec
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - siosec-redis:/data
    networks:
      - siosec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  # ── Mailpit (captura de correos en desarrollo) ─────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${FORWARD_MAILPIT_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks:
      - siosec

networks:
  siosec:
    driver: bridge

volumes:
  siosec-pgsql:
    driver: local
  siosec-redis:
    driver: local
  siosec-storage:
    driver: local
  siosec-logs:
    driver: local
